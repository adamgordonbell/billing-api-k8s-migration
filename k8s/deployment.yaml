apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
  namespace: payments
  labels:
    app.kubernetes.io/name: billing-api
    app.kubernetes.io/instance: billing-api-prod
    app.kubernetes.io/version: "1.4.2"
    team: payments
    env: prod
    cost-center: fin-310
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-api
      app.kubernetes.io/instance: billing-api-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-api
        app.kubernetes.io/instance: billing-api-prod
        app.kubernetes.io/version: "1.4.2"
        team: payments
        env: prod
        cost-center: fin-310
    spec:
      containers:
        - name: billing-api
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/billing-api:1.4.2
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
